context.modules = [
    {   name = libpipewire-module-filter-chain
        args = {
            node.description = "Upmix Sink"
            node.name = "Upmix_Sink"
            filter.graph = {
                nodes = [
                    { type = builtin name = copyFL label = copy }
                    { type = builtin name = copyFR label = copy }
                    
                    # High-pass filters for Main/Center/Rear (The "Mud Fix")
                    # These will be updated via module reload for surgical precision
                    { type = builtin name = hpFL  label = param_eq config = { filters1 = [ { type = bq_highpass freq = 120 } ] } }
                    { type = builtin name = hpFR  label = param_eq config = { filters1 = [ { type = bq_highpass freq = 120 } ] } }
                    { type = builtin name = hpFC  label = param_eq config = { filters1 = [ { type = bq_highpass freq = 120 } ] } }
                    { type = builtin name = hpRL  label = param_eq config = { filters1 = [ { type = bq_highpass freq = 120 } ] } }
                    { type = builtin name = hpRR  label = param_eq config = { filters1 = [ { type = bq_highpass freq = 120 } ] } }

                    { name = mixFC  type = builtin label = mixer }
                    { name = mixRL  type = builtin label = mixer }
                    { name = mixRR  type = builtin label = mixer }
                    { name = mixLFE type = builtin label = mixer }
                    
                    # Subwoofer "Extreme Punch" chain
                    {
                        type = builtin
                        name = eqBoost
                        label = param_eq
                        config = { filters1 = [ { type = bq_peaking freq = 60 q = 1.2 gain = 0 } ] }
                        control = { "Gain 1" = 0.0 }
                    }
                    
                    # 4th order Low-pass (Surgical bass separation)
                    {
                        type = builtin
                        name = lpLFE
                        label = param_eq
                        config = {
                            filters1 = [ 
                                { type = bq_lowpass freq = 120 },
                                { type = bq_lowpass freq = 120 }
                            ]
                        }
                    }

                    # Subwoofer Compressor for the "Xear Bass" punch
                    {
                        type = builtin
                        name = subComp
                        label = compressor
                        config = {
                            attack = 0.005
                            release = 0.05
                            threshold = 0.4
                            ratio = 6.0
                            knee = 0.5
                            makeup = 1.2
                        }
                    }

                    # Delays
                    { type = builtin name = delayRL  label = delay config = { "max-delay" = 0.5 } }
                    { type = builtin name = delayRR  label = delay config = { "max-delay" = 0.5 } }
                    { type = builtin name = delayLFE label = delay config = { "max-delay" = 0.1 } }
                ]
                links = [
                    # Route High-passed audio to main outputs
                    { output = "copyFL:Out" input = "hpFL:In 1" }
                    { output = "copyFR:Out" input = "hpFR:In 1" }
                    
                    # Center mix then high-pass
                    { output = "copyFL:Out" input = "mixFC:In 1" }
                    { output = "copyFR:Out" input = "mixFC:In 2" }
                    { output = "mixFC:Out"  input = "hpFC:In 1" }
                    
                    # Rear mix then high-pass
                    { output = "copyFL:Out" input = "mixRL:In 1" }
                    { output = "copyFR:Out" input = "mixRR:In 1" }
                    { output = "mixRL:Out"  input = "hpRL:In 1" }
                    { output = "mixRR:Out"  input = "hpRR:In 1" }
                    { output = "hpRL:Out 1" input = "delayRL:In" }
                    { output = "hpRR:Out 1" input = "delayRR:In" }
                    
                    # LFE chain: Mix -> Boost -> Lowpass -> Compressor -> Delay
                    { output = "copyFL:Out" input = "mixLFE:In 1" }
                    { output = "copyFR:Out" input = "mixLFE:In 2" }
                    { output = "mixLFE:Out" input = "eqBoost:In 1" }
                    { output = "eqBoost:Out 1" input = "lpLFE:In 1" }
                    { output = "lpLFE:Out 1" input = "subComp:In" }
                    { output = "subComp:Out" input = "delayLFE:In" }
                ]
                inputs = [ "copyFL:In" "copyFR:In" ]
                outputs = [ 
                    "hpFL:Out 1" "hpFR:Out 1" "hpFC:Out 1" 
                    "delayLFE:Out" "delayRL:Out" "delayRR:Out" 
                ]
            }
            capture.props = {
                node.name = "Upmix_Sink"
                media.class = "Audio/Sink"
                audio.channels = 2
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name = "Upmix_Output"
                audio.channels = 6
                audio.position = [ FL FR FC LFE RL RR ]
                node.passive = true
            }
        }
    }
]
